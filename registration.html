<!DOCTYPE html>
<html>
<head>
    <title>Registration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body onload="updateTime()">
<nav>
    <a href="home.html">Home</a>
    <a href="about.html">About</a>
    <a href="gallery.html">Gallery</a>
    <a href="registration.html">Register</a>
    <a href="login.html">Login</a>
</nav>

<div class="container">
    <h1>Register</h1>
    
        <form id="registerForm">
    <input type="text" id="name" placeholder="Full Name">
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <input type="password" id="confirm" placeholder="Confirm Password">
    <script>
document.getElementById("registerForm").addEventListener("submit", function(e){

    let name = document.getElementById("name").value.trim();
    let email = document.getElementById("email").value.trim();
    let password = document.getElementById("password").value;
    let confirm = document.getElementById("confirm").value;
    let error = document.getElementById("regError");

    error.innerHTML = "";

    if (name.length < 3) {
        error.innerHTML = "Name must be at least 3 characters";
        e.preventDefault();
        return;
    }

    if (!email.includes("@")) {
        error.innerHTML = "Enter valid email";
        e.preventDefault();
        return;
    }

    if (password.length < 6) {
        error.innerHTML = "Password must be at least 6 characters";
        e.preventDefault();
        return;
    }

    if (password !== confirm) {
        error.innerHTML = "Passwords do not match";
        e.preventDefault();
        return;
    }

    alert("Registration successful!");
});
</script>

    <p id="regError" style="color:red;"></p>

    <button type="submit">Register</button>
</form>
        <button>Register</button>
    </form>
    <p>Already have an account?</p>
<a href="login.html">Go to Login</a>

</div>
<footer class="footer">
    <p>Developed by Level 3 SOD Team</p>
    <p id="time"></p>
</footer>

<script>
function updateTime() {
    let now = new Date();
    document.getElementById("time").innerHTML =
        now.toLocaleTimeString();
}
setInterval(updateTime, 1000);
updateTime();
</script>

<script src="script.js"></script>
</body>
</html>
